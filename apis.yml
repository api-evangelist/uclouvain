---
aid: uclouvain
name: UCLouvain
description: >-
  UCLouvain (Universite catholique de Louvain) is Belgium's largest French-speaking
  university, based in Louvain-la-Neuve, and is ranked #203 in the QS World University
  Rankings 2025. Its public, machine-readable footprint is concentrated in open
  science and library infrastructure rather than a single unified developer portal:
  the institution operates an institutional Dataverse open-data repository and the
  DIAL (Digital Access to Libraries) institutional repository, both of which expose
  standards-based APIs (Dataverse Native/Search API and OAI-PMH metadata harvesting).
  UCLouvain also maintains a public GitHub organization and originated the open-source
  OSIS (Open Student Information System) project. No single gated, key-issuing
  developer portal was confirmed at the time of review.
