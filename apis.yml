apis:
  - aid: uclouvain:dataverse-api
    name: Open Data @ UCLouvain Dataverse API
    description: >-
      UCLouvain's institutional research-data repository runs on Dataverse (v6.8 at
      time of review) and exposes the standard Dataverse Native and Search APIs under
      /api, allowing programmatic search and retrieval of datasets, files, and
      metadata. UCLouvain was the first Belgian university to deploy an institutional
      open-data repository.
    humanURL: https://dataverse.uclouvain.be/
    baseURL: https://dataverse.uclouvain.be/api
    tags: [ Open Data, Research Data, Dataverse, Open Science ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/latest/api/
      - type: OpenAPI
        url: openapi/uclouvain-dataverse-api.yaml
      - type: x-json-schema
        url: json-schema/uclouvain-dataset-schema.json
      - type: x-json-structure
        url: json-structure/uclouvain-dataset-structure.json
      - type: x-example
        url: examples/uclouvain-search-example.json
      - type: x-rules
        url: rules/uclouvain-rules.yml
      - type: x-vocabulary
        url: vocabulary/uclouvain-vocabulary.yml
      - type: x-json-ld
        url: json-ld/uclouvain-context.jsonld
  - aid: uclouvain:dataverse-oai
    name: Open Data @ UCLouvain Dataverse OAI-PMH
    description: >-
      The UCLouvain Dataverse repository exposes an OAI-PMH 2.0 metadata-harvesting
      endpoint ("Open Data @ UCLouvain Dataverse OAI Archive") for harvesting dataset
      metadata by external aggregators and service providers.
    humanURL: https://dataverse.uclouvain.be/
    baseURL: https://dataverse.uclouvain.be/oai
    tags: [ OAI-PMH, Open Data, Metadata, Research Data ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/latest/api/oai.html
  - aid: uclouvain:dial-oai
    name: DIAL UCLouvain OAI-PMH
    description: >-
      DIAL (Digital Access to Libraries) is UCLouvain's institutional repository for
      research publications. It exposes an OAI-PMH 2.0 endpoint ("DIAL UCLouvain
      Repository") for harvesting publication metadata into discovery systems and
      aggregators.
    humanURL: https://dial.uclouvain.be/
    baseURL: https://dial.uclouvain.be/oai
    tags: [ OAI-PMH, Institutional Repository, Library, Metadata, Open Access ]
    properties:
      - type: Documentation
        url: https://www.openarchives.org/OAI/openarchivesprotocol.html
  - aid: uclouvain:osis
    name: OSIS - Open Student Information System
    description: >-
      OSIS (Open Student Information System) is an open-source higher-education
      management platform originated and maintained by UCLouvain to manage students,
      teachers, courses, and programs. It is a Django application published on GitHub
      and includes REST API and SDK components; it is run by the institution rather
      than offered as a hosted public API.
    humanURL: https://github.com/uclouvain/osis
    tags: [ Open Source, Student Information System, Higher Education, Django ]
    properties:
      - type: Documentation
        url: https://github.com/uclouvain/osis
      - type: GitHub
        url: https://github.com/uclouvain/osis
