    summary: >-
      Verified live, standards-based APIs rather than a unified gated developer
      portal. The institutional Dataverse repository (v6.8) responds on its Native
      and Search API and on OAI-PMH; the DIAL institutional repository serves a valid
      OAI-PMH Identify response. The official uclouvain GitHub org exists, and the
      open-source OSIS project is published there. No key-issuing developer portal or
      published rate limits were found. All endpoints below were probed live; nothing
      was fabricated.
    endpoints:
      - url: https://dataverse.uclouvain.be/api/search?q=*&type=dataset&per_page=1
        status: 200
        note: Dataverse Search API responds.
      - url: https://dataverse.uclouvain.be/api/info/version
        status: 200
        note: Returns Dataverse version 6.8 build 1994-92d1ec8.
      - url: https://dataverse.uclouvain.be/oai?verb=Identify
        status: 200
        note: Valid OAI-PMH Identify, repo "Open Data @ UCLouvain Dataverse OAI Archive".
      - url: https://dial.uclouvain.be/oai?verb=Identify
